name: "MCP Trustcard"
description: "Run a trust-card healthcheck against an MCP server in CI. Fails the job when the score drops below a threshold."
branding:
  icon: "shield"
  color: "green"
inputs:
  server:
    description: "npm package spec of the MCP server to scan (e.g. @modelcontextprotocol/server-github)"
    required: true
  min-score:
    description: "Minimum score (0-100) required to pass. Default 50."
    required: false
    default: "50"
  json-out:
    description: "Path to write the JSON report. Optional."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Run mcp-trustcard
      shell: bash
      run: |
        args=""
        if [ -n "${{ inputs.json-out }}" ]; then args="--json-out ${{ inputs.json-out }}"; fi
        npx -y mcp-trustcard@latest ${{ inputs.server }} $args || true
        score=$(npx -y mcp-trustcard@latest --json ${{ inputs.server }} 2>/dev/null | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{console.log(JSON.parse(s).score)}catch{console.log(0)}})")
        echo "Score: $score (min: ${{ inputs.min-score }})"
        if [ "$score" -lt "${{ inputs.min-score }}" ]; then
          echo "::error::MCP server ${{ inputs.server }} scored $score, below minimum ${{ inputs.min-score }}"
          exit 1
        fi
